</script>
<style>
  /* ===========================================================
     APLEONA Corporate Design – Approximation
     Primärfarbe: Apleona-Mint/Türkis (frischer Akzent)
     Sekundärfarbe: Anthrazit (Header, Headlines)
     Hintergrund: warmes Off-White
     iPad-optimiert: Touch-Targets ≥ 44 px, Sticky-Footer,
                     16 px Schriftgrösse in Inputs (iOS-Zoom-Schutz)
     =========================================================== */
  :root{
    /* Apleona-Markenfarben (gemäss Logo: Navy + Rot) */
    --apleona-navy:#0F2547;
    --apleona-navy-2:#1A3358;
    --apleona-navy-soft:#E8EDF4;
    --apleona-red:#E94E3F;
    --apleona-red-dark:#C9382C;
    --apleona-red-soft:#FDEDEA;
    --apleona-bg:#F4F6FA;
    --apleona-line:#DDE3EC;
    --apleona-text:#0F2547;
    --apleona-muted:#5C6B82;

    /* Generische Aliase (App-weit verwendet) */
    --primary:var(--apleona-red);
    --primary-dark:var(--apleona-navy);
    --accent:var(--apleona-navy-soft);
    --bg:var(--apleona-bg);
    --panel:#ffffff;
    --text:var(--apleona-text);
    --muted:var(--apleona-muted);
    --border:var(--apleona-line);
    --ok:#2F9E44;
    --warn:#F08C00;
    --danger:var(--apleona-red-dark);
    --radius:14px;
    --shadow:0 1px 2px rgba(15,37,71,.05),0 2px 6px rgba(15,37,71,.04);
    --shadow-lg:0 6px 18px rgba(15,37,71,.12);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text);height:100%;-webkit-text-size-adjust:100%;}
  /* iOS-Safari: 100vh ist instabil, weil es die Adressleiste mitrechnet.
     100dvh (dynamic viewport) ist die korrekte Höhe. -webkit-fill-available als alter Fallback. */
  body{
    display:flex;flex-direction:column;
    height:100vh;
    height:-webkit-fill-available;
    height:100dvh;
    overflow:hidden;
    overscroll-behavior:none;
  }

  /* ----- Header (Apleona-Navy mit roter Akzentlinie & Wordmark) ----- */
  header{
    background:var(--apleona-navy);
    color:#fff;
    padding:14px 28px calc(14px + env(safe-area-inset-top,0px)/2) 28px;
    padding-top:calc(14px + env(safe-area-inset-top,0px));
    display:flex;align-items:center;justify-content:space-between;
    gap:16px;
    position:relative;
    flex-shrink:0;
  }
  header::after{
    content:'';position:absolute;left:0;right:0;bottom:0;height:3px;
    background:var(--apleona-red);
  }
  .brand{display:flex;align-items:center;gap:16px;min-width:0;}
  .brand-mark{
    font-weight:800;
    font-size:22px;
    letter-spacing:1.2px;
    color:var(--apleona-red);
    text-transform:uppercase;
    line-height:1;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif;
  }
  .brand-divider{width:1px;height:28px;background:rgba(255,255,255,.18);}
  header h1{margin:0;font-size:17px;font-weight:600;letter-spacing:.1px;color:#fff;}
  header .object{font-size:13px;opacity:.7;margin-top:2px;}
  header .hleft{display:flex;align-items:center;gap:14px;min-width:0;}
  header .crumb{font-size:13px;opacity:.75;cursor:pointer;color:#fff;}
  header .crumb:hover{opacity:1;text-decoration:underline;}

  .shell{display:flex;flex:1;min-height:0;}

  /* ----- Stepper-Sidebar (Off-White, dezenter Apleona-Look) ----- */
  nav.stepper{width:280px;background:#fff;border-right:1px solid var(--border);overflow-y:auto;padding:14px 0;flex-shrink:0;-webkit-overflow-scrolling:touch;}
  nav.stepper .nav-home{display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;color:var(--apleona-navy);font-weight:600;border-bottom:1px solid var(--border);margin-bottom:8px;font-size:15px;}
  nav.stepper .nav-home:hover{background:var(--accent);}
  nav.stepper .step{display:flex;gap:12px;padding:12px 20px;cursor:pointer;align-items:center;border-left:4px solid transparent;font-size:14px;color:var(--muted);min-height:48px;}
  nav.stepper .step.active{background:var(--accent);border-left-color:var(--primary);color:var(--apleona-navy);font-weight:600;}
  nav.stepper .step.done{color:var(--apleona-red-dark);}
  nav.stepper .step.skipped{opacity:.45;font-style:italic;cursor:not-allowed;}
  nav.stepper .step.skipped .num{background:var(--border);}
  nav.stepper .step.skipped .skip-tag{font-size:11px;background:var(--border);color:var(--muted);padding:1px 6px;border-radius:6px;margin-left:6px;font-style:normal;}
  nav.stepper .step.locked{opacity:.55;cursor:not-allowed;}
  nav.stepper .step.locked .num{background:var(--border);}
  nav.stepper .step.locked .lock-tag{font-size:11px;background:#fee2e2;color:var(--danger);padding:1px 6px;border-radius:6px;margin-left:6px;font-weight:600;}
  nav.stepper .step .num{width:30px;height:30px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
  nav.stepper .step.active .num{background:var(--primary);}
  nav.stepper .step.done .num{background:var(--apleona-red);}

  /* ----- Main / Karten ----- */
  main{flex:1;overflow-y:auto;padding:28px 36px calc(28px + var(--safe-bottom)) 36px;-webkit-overflow-scrolling:touch;}
  .card{background:var(--panel);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:20px;}
  .card h2{margin:0 0 8px 0;font-size:20px;color:var(--apleona-navy);font-weight:700;letter-spacing:-.2px;}
  .card p.subtitle{margin:0 0 18px 0;color:var(--muted);font-size:14px;line-height:1.5;}

  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
  .grid.cols-3{grid-template-columns:repeat(3,1fr);}
  label{display:block;font-size:13px;color:var(--apleona-navy);margin-bottom:6px;font-weight:600;letter-spacing:.1px;}

  /* Inputs – min 44px hoch, ≥ 16px Schrift (verhindert iOS-Zoom) */
  input[type=text],input[type=tel],input[type=email],input[type=number],input[type=date],input[type=time],input[type=datetime-local],input[type=search],select,textarea{
    width:100%;
    border:1px solid var(--border);
    border-radius:10px;
    padding:12px 14px;
    font-size:16px;
    background:#fff;
    outline:none;
    transition:border-color .15s, box-shadow .15s;
    font-family:inherit;
    color:var(--text);
    min-height:44px;
    -webkit-appearance:none;appearance:none;
  }
  select{background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%231F1F1F' stroke-width='1.6' fill='none' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 14px center;padding-right:36px;}
  input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,168,154,.18);}
  textarea{resize:vertical;min-height:80px;}

  /* Checkbox / Switch-Look */
  .checkbox{display:flex;align-items:flex-start;gap:12px;padding:10px 0;cursor:pointer;}
  .checkbox input{width:24px;height:24px;accent-color:var(--primary);flex-shrink:0;margin-top:1px;}
  .checkbox span{font-size:15px;line-height:1.45;}

  /* Risikomatrix */
  .risk-row{display:grid;grid-template-columns:minmax(200px,1.3fr) 280px 1.5fr;gap:14px;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);}
  .risk-row:last-child{border-bottom:none;}
  .risk-row .risk-label{font-weight:600;font-size:14px;color:var(--apleona-navy);}
  .risk-row .risk-measure{font-size:13px;color:var(--muted);line-height:1.45;}
  .risk-buttons{display:flex;gap:6px;}
  .risk-btn{flex:1;padding:12px 10px;border:2px solid var(--border);background:#fff;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;text-align:center;min-height:44px;}
  .risk-btn.h{color:var(--danger);}
  .risk-btn.m{color:var(--warn);}
  .risk-btn.t{color:var(--ok);}
  .risk-btn.active.h{background:var(--danger);color:#fff;border-color:var(--danger);}
  .risk-btn.active.m{background:var(--warn);color:#fff;border-color:var(--warn);}
  .risk-btn.active.t{background:var(--ok);color:#fff;border-color:var(--ok);}

  .banner{padding:12px 16px;border-radius:10px;font-size:14px;margin-top:12px;display:none;}
  .banner.danger{background:#fff0f0;color:var(--danger);border-left:4px solid var(--danger);}
  .banner.show{display:block;}

  /* Tabelle Schlüssel */
  table.keys{width:100%;border-collapse:collapse;}
  table.keys th,table.keys td{border:1px solid var(--border);padding:8px;text-align:left;font-size:13px;}
  table.keys th{background:var(--accent);font-weight:700;color:var(--apleona-navy);}
  table.keys input{border:none;padding:8px 4px;min-height:38px;font-size:14px;border-radius:6px;}
  table.keys input:focus{background:#f0fbf8;box-shadow:none;}

  /* Buttons – min 44px hoch */
  .btn{
    padding:12px 22px;border:none;border-radius:10px;
    font-size:15px;font-weight:700;cursor:pointer;
    transition:transform .08s, background .15s, box-shadow .15s;
    font-family:inherit;letter-spacing:.1px;
    min-height:44px;
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    -webkit-appearance:none;appearance:none;
  }
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--primary);color:#fff;box-shadow:0 1px 2px rgba(0,168,154,.25);}
  .btn-primary:hover{background:var(--apleona-red-dark);}
  .btn-secondary{background:#fff;color:var(--apleona-navy);border:1.5px solid var(--apleona-navy);}
  .btn-secondary:hover{background:var(--apleona-navy);color:#fff;}
  .btn-ghost{background:transparent;color:var(--muted);min-height:36px;padding:6px 12px;}
  .btn-ghost:hover{color:var(--apleona-navy);background:rgba(0,0,0,.04);}
  .btn-danger{background:var(--danger);color:#fff;}
  .btn-success{background:var(--apleona-red);color:#fff;}

  /* Sticky Footer-Navigation (iPad-tauglich, mit Safe-Area) */
  .footer-nav{
    display:flex;justify-content:space-between;gap:12px;
    padding:14px 32px calc(14px + var(--safe-bottom)) 32px;
    background:#fff;
    border-top:1px solid var(--border);
    align-items:center;
    box-shadow:0 -2px 8px rgba(31,31,31,.04);
    flex-shrink:0;
  }

  /* Unterschriftspad – komplett Touch-fähig */
  .sig-box{border:2px dashed var(--border);border-radius:10px;background:#fafbfa;height:200px;position:relative;overflow:hidden;touch-action:none;}
  .sig-box canvas{width:100%;height:100%;display:block;cursor:crosshair;}
  .sig-placeholder{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--muted);font-size:14px;pointer-events:none;}
  .sig-actions{display:flex;justify-content:space-between;margin-top:10px;align-items:center;gap:8px;flex-wrap:wrap;}

  .pill{display:inline-block;padding:3px 12px;border-radius:999px;font-size:12px;font-weight:700;letter-spacing:.1px;}
  .pill.hoch{background:#ffe3e3;color:var(--danger);}
  .pill.mittel{background:#fff4e0;color:var(--warn);}
  .pill.tief{background:#dff7eb;color:#1a7a36;}
  .pill.draft{background:#fff4e0;color:var(--warn);}
  .pill.done{background:#dff7eb;color:#1a7a36;}
  .pill.active{background:var(--accent);color:var(--apleona-navy);}

  .summary dl{display:grid;grid-template-columns:220px 1fr;gap:8px 18px;margin:0;font-size:14px;}
  .summary dt{color:var(--muted);font-weight:600;}
  .summary dd{margin:0;}

  /* Status-Chip im Header */
  .status-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;font-size:13px;font-weight:600;background:rgba(255,255,255,.10);color:#fff;}
  .status-chip .dot{width:8px;height:8px;border-radius:50%;background:var(--apleona-red);}
  .status-chip.done{background:rgba(126,212,198,.25);color:#fff;}
  .status-chip.done .dot{background:var(--apleona-red);}

  .section-title{display:flex;align-items:center;gap:10px;margin:24px 0 12px 0;color:var(--apleona-navy);font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;}
  .hidden{display:none!important;}
  .banner-info{background:var(--accent);padding:12px 16px;border-radius:10px;color:var(--apleona-navy);font-size:13px;margin-bottom:16px;border-left:4px solid var(--primary);line-height:1.5;}
  .progressbar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:6px;}
  .progressbar>div{height:100%;background:linear-gradient(90deg,var(--apleona-navy) 0%,var(--apleona-red) 100%);transition:width .3s;}

  /* Dashboard */
  .dash-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:12px;}
  .dash-head h2{margin:0;font-size:24px;color:var(--apleona-navy);font-weight:700;letter-spacing:-.3px;}
  .tabs{display:flex;gap:4px;background:#fff;padding:4px;border-radius:12px;border:1px solid var(--border);}
  .tabs .tab{padding:10px 18px;border-radius:8px;cursor:pointer;font-size:14px;color:var(--muted);font-weight:600;border:none;background:transparent;min-height:40px;}
  .tabs .tab.active{background:var(--apleona-navy);color:#fff;}
  .tabs .tab .cnt{margin-left:8px;opacity:.7;font-size:12px;font-weight:500;}
  .searchbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
  .searchbar input[type=search]{max-width:360px;}
  .formcard{background:#fff;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:12px;display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center;border-left:4px solid transparent;cursor:pointer;transition:all .15s;}
  .formcard:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px);}
  .formcard.draft{border-left-color:var(--warn);}
  .formcard.done{border-left-color:var(--ok);}
  .formcard .meta{display:flex;gap:14px;align-items:center;flex-wrap:wrap;font-size:13px;color:var(--muted);margin-top:6px;}
  .formcard .meta b{color:var(--text);font-weight:600;}
  .formcard .title{font-weight:700;font-size:16px;color:var(--apleona-navy);margin-bottom:2px;}
  .formcard .percent{width:160px;}
  .formcard .actions{display:flex;gap:6px;}
  .icon-btn{width:44px;height:44px;border-radius:10px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:18px;display:inline-flex;align-items:center;justify-content:center;transition:background .15s;}
  .icon-btn:hover{background:var(--accent);}
  .icon-btn.danger:hover{background:#fff0f0;color:var(--danger);}
  .empty{background:#fff;padding:48px 24px;border-radius:var(--radius);text-align:center;color:var(--muted);border:2px dashed var(--border);}
  .empty h3{color:var(--apleona-navy);margin:0 0 8px 0;}
  .save-indicator{font-size:12px;color:rgba(255,255,255,.7);display:inline-flex;align-items:center;gap:6px;}
  .save-indicator.saved{color:#9CE0AE;}
  .save-indicator .dot{width:7px;height:7px;border-radius:50%;background:currentColor;}

  /* ===== iPad-spezifische Optimierungen (Portrait + Landscape) ===== */
  @media (max-width: 1180px){
    main{padding:22px 24px calc(22px + var(--safe-bottom)) 24px;}
    nav.stepper{width:240px;}
  }
  @media (max-width: 900px){
    /* iPad Portrait & kleinere Tablets: kompakter Stepper, 1-Spalter */
    nav.stepper{width:84px;}
    nav.stepper .nav-home span:not(.num){display:none;}
    nav.stepper .step{padding:12px 0;justify-content:center;flex-direction:column;gap:4px;}
    nav.stepper .step span:not(.num){display:none;}
    nav.stepper .step .num{width:34px;height:34px;font-size:14px;}
    header{padding-left:18px;padding-right:18px;}
    header h1{font-size:16px;}
    main{padding:18px 18px calc(18px + var(--safe-bottom)) 18px;}
    .card{padding:18px;border-radius:12px;}
    .card h2{font-size:18px;}
    .grid{grid-template-columns:1fr;}
    .grid.cols-3{grid-template-columns:1fr;}
    .risk-row{grid-template-columns:1fr;gap:8px;padding:14px 0;}
    .risk-row .risk-buttons{margin:4px 0;}
    .formcard{grid-template-columns:1fr;}
    .summary dl{grid-template-columns:1fr;gap:2px 0;}
    .summary dt{margin-top:8px;}
    .footer-nav{padding:12px 18px calc(12px + var(--safe-bottom)) 18px;}
    .btn{padding:14px 22px;font-size:15px;}
    .icon-btn{width:48px;height:48px;}
    .tabs .tab{padding:12px 16px;}
  }
  @media (max-width: 600px){
    header{padding-left:14px;padding-right:14px;}
    .brand-divider{display:none;}
    header h1{display:none;}
    main{padding:14px 14px calc(14px + var(--safe-bottom)) 14px;}
    .card{padding:16px;}
    .footer-nav .btn{flex:1;}
    .footer-nav{padding:10px 14px calc(10px + var(--safe-bottom)) 14px;}
  }
</style>
</head>
<body>
<noscript>
  <div style="padding:24px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#fff0f0;color:#74110a;border:1px solid #c92a2a;border-radius:8px;margin:20px;">
    <h2 style="margin-top:0;">⚠️ JavaScript ist deaktiviert</h2>
    <p>Dieser Prototyp benötigt JavaScript. Sie haben die Datei vermutlich in einer Vorschau geöffnet, die keine Skripte ausführt. Bitte öffnen Sie die Datei direkt in Safari, Edge oder Chrome.</p>
  </div>
</noscript>
<header>
  <div class="brand">
    <span class="brand-mark" aria-label="Apleona">APLEONA</span>
    <span class="brand-divider"></span>
    <div>
      <h1>Permit to Work</h1>
      <div class="object" id="hdrObject">Übersicht</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <span class="save-indicator saved" id="saveInd"><span class="dot"></span><span id="saveIndText">gespeichert</span></span>
    <span class="status-chip" id="hdrStatus"><span class="dot"></span><span id="hdrStatusText">Entwurf</span></span>
  </div>
</header>

<div class="shell">
  <nav class="stepper" id="stepper"></nav>
  <main id="main"></main>
</div>

<div class="footer-nav" id="footerNav">
  <button class="btn btn-ghost" id="btnBack">← Zurück</button>
  <div style="flex:1;text-align:center;font-size:12px;color:var(--muted);align-self:center;">
    <div>Schritt <span id="stepLabel">1</span> von <span id="stepTotal">10</span> · <span id="pctLabel">0%</span> vollständig</div>
    <div class="progressbar" style="width:240px;margin:4px auto 0;"><div id="stepBar" style="width:10%"></div></div>
  </div>
  <div style="display:flex;gap:8px;">
    <button class="btn btn-secondary" id="btnSaveExit">💾 Speichern & zurück</button>
    <button class="btn btn-primary" id="btnNext">Weiter →</button>
  </div>
</div>

<script>
/* ============================================================
   Permit to Work – Prototyp mit Mehrfach-Formularverwaltung
   Speicherung: localStorage (pro Browser/Gerät)
   ============================================================ */

const STORAGE_KEY = 'dacheinweisung_forms_v2';
const MASTER_KEY  = 'ptw_master_v1';
const SESSION_KEY = 'ptw_session_v1';   // letzter Mode/Permit/Schritt – wird beim Refresh wiederhergestellt

/* Auto-Backup der Stammdaten: rotierende Slots, damit selbst bei einem defekten
   MASTER_KEY (oder wenn er versehentlich mit leer überschrieben wurde) noch ein
   funktionierender Snapshot da ist, aus dem der Nutzer wiederherstellen kann. */
const MASTER_BACKUP_PREFIX = 'ptw_master_backup_';
const MASTER_BACKUP_SLOTS  = 3;
function currentMasterCount(){
  return (app.master.instructors||[]).length +
         (app.master.properties||[]).length +
         (app.master.contractors||[]).length;
}
function saveMasterBackupSnapshot(){
  if(currentMasterCount() === 0) return; // nie leere Snapshots anlegen
  try{
    // rotierendes 3-Slot-Backup: neuestes in Slot 0, ältere runterschieben
    for(let i = MASTER_BACKUP_SLOTS-1; i >= 1; i--){
      const prev = localStorage.getItem(MASTER_BACKUP_PREFIX + (i-1));
      if(prev) localStorage.setItem(MASTER_BACKUP_PREFIX + i, prev);
    }
    localStorage.setItem(MASTER_BACKUP_PREFIX + '0', JSON.stringify({
      savedAt: new Date().toISOString(),
      master: app.master,
    }));
  }catch(e){ console.warn('Master-Auto-Backup fehlgeschlagen:', e); }
}
function listMasterBackups(){
  const out = [];
  for(let i = 0; i < MASTER_BACKUP_SLOTS; i++){
    try{
      const raw = localStorage.getItem(MASTER_BACKUP_PREFIX + i);
      if(!raw) continue;
      const obj = JSON.parse(raw);
      if(obj && obj.master){
        const c = (obj.master.instructors||[]).length +
                  (obj.master.properties||[]).length +
                  (obj.master.contractors||[]).length;
        out.push({slot:i, savedAt:obj.savedAt||'', count:c, master:obj.master});
      }
    }catch(e){}
  }
  return out;
}
function installMasterAutoBackup(){
  // alle 60 Sekunden ein Snapshot, plus einer sofort nach Init
  try{ saveMasterBackupSnapshot(); }catch(e){}
  setInterval(()=>{ try{ saveMasterBackupSnapshot(); }catch(e){} }, 60*1000);
}

/* Auto-Backup für Formulare – analog zum Master-Auto-Backup. */
const FORMS_BACKUP_PREFIX = 'ptw_forms_backup_';
const FORMS_BACKUP_SLOTS  = 3;
function saveFormsBackupSnapshot(){
  if(!Array.isArray(app.forms) || app.forms.length === 0) return; // nie leere Snapshots anlegen
  try{
    for(let i = FORMS_BACKUP_SLOTS-1; i >= 1; i--){
      const prev = localStorage.getItem(FORMS_BACKUP_PREFIX + (i-1));
      if(prev) localStorage.setItem(FORMS_BACKUP_PREFIX + i, prev);
    }
    localStorage.setItem(FORMS_BACKUP_PREFIX + '0', JSON.stringify({
      savedAt: new Date().toISOString(),
      forms:   app.forms,
    }));
  }catch(e){ console.warn('Formular-Auto-Backup fehlgeschlagen:', e); }
}
function listFormsBackups(){
  const out = [];
  for(let i = 0; i < FORMS_BACKUP_SLOTS; i++){
    try{
      const raw = localStorage.getItem(FORMS_BACKUP_PREFIX + i);
      if(!raw) continue;
      const obj = JSON.parse(raw);
      if(obj && Array.isArray(obj.forms)) out.push({slot:i, savedAt:obj.savedAt||'', count:obj.forms.length, forms:obj.forms});
    }catch(e){}
  }
  return out;
}
function installFormsAutoBackup(){
  try{ saveFormsBackupSnapshot(); }catch(e){}
  setInterval(()=>{ try{ saveFormsBackupSnapshot(); }catch(e){} }, 60*1000);
}
/* ------- Storage-Diagnose ---------------------------------------------------
   Zeigt live an, was im localStorage steht: alle unsere Keys, ihre Größen
   in Bytes, Zeitstempel und den Browser. Damit lässt sich zielsicher
   feststellen, ob z. B. auf Windows Chrome/Edge die Werte tatsächlich
   geschrieben werden – oder ob sie stillschweigend blockiert / verworfen
   werden (Corporate Policy, Datenschutz-Blocker, Cookie-Reset etc.).       */
function _fmtBytes(n){
  if(!n && n!==0) return '–';
  if(n < 1024) return n+' B';
  if(n < 1024*1024) return (n/1024).toFixed(1)+' kB';
  return (n/1024/1024).toFixed(2)+' MB';
}
function _readLS(key){
  try{ return localStorage.getItem(key); }catch(e){ return null; }
}
function collectStorageDiagnostics(){
  const keys = [STORAGE_KEY, MASTER_KEY, SESSION_KEY]
    .concat([0,1,2].map(i => MASTER_BACKUP_PREFIX+i))
    .concat([0,1,2].map(i => FORMS_BACKUP_PREFIX+i));
  const entries = keys.map(k => {
    const v = _readLS(k);
    let items = null, savedAt = null;
    if(v){
      try{
        const p = JSON.parse(v);
        if(Array.isArray(p)) items = p.length + ' Element(e)';
        else if(p && p.master) items = 'Master · ' + ((p.master.instructors||[]).length+(p.master.properties||[]).length+(p.master.contractors||[]).length) + ' Einträge';
        else if(p && Array.isArray(p.forms)) items = 'Forms · ' + p.forms.length + ' Permit(s)';
        else if(p && typeof p === 'object'){ items = Object.keys(p).slice(0,4).join(', '); }
        if(p && p.savedAt) savedAt = p.savedAt;
      }catch(e){ items = '⚠ nicht parsebar'; }
    }
    return { key:k, size: v ? v.length : 0, items, savedAt };
  });
  const totalUsed = entries.reduce((a,e)=>a+e.size, 0);
  // Kapazitäts-Schätzung: iterativ testen, wie viel wir noch schreiben könnten (bis max 5 MB).
  let capacityKB = null;
  try{
    const testKey = '__ptw_capacity__';
    let payload = '';
    const step = 100 * 1024; // 100 kB pro Schritt
    for(let i = 0; i < 50; i++){
      const next = payload + 'x'.repeat(step);
      try{ localStorage.setItem(testKey, next); payload = next; }
      catch(_){ break; }
    }
    capacityKB = Math.round(payload.length / 1024);
    try{ localStorage.removeItem(testKey); }catch(_){}
  }catch(e){}
  return { entries, totalUsed, capacityKB, storageOK:STORAGE_OK, storageErr:STORAGE_ERR, ua:navigator.userAgent };
}
function showStorageDiagnostics(){
  const d = collectStorageDiagnostics();
  const overlay = document.createElement('div');

// Zeigt an, ob localStorage in der aktuellen Umgebung tatsächlich schreib- und lesbar ist.
// Wenn nicht (Privater Modus, iOS ITP-Löschung, Cookie-Blocker), setzen wir ein Flag,
// damit die App eine sichtbare Warnung zeigt und der Nutzer weiss, dass Daten NICHT persistiert werden.
let STORAGE_OK = true;
let STORAGE_ERR = '';
function storageHealthCheck(){
  const testKey = '__ptw_probe__';
  try{
    localStorage.setItem(testKey, '1');
    const v = localStorage.getItem(testKey);
    localStorage.removeItem(testKey);
    if(v !== '1'){ STORAGE_OK = false; STORAGE_ERR = 'Testwert konnte nicht zurückgelesen werden'; }
  }catch(e){
    STORAGE_OK = false;
    STORAGE_ERR = (e && (e.name+': '+e.message)) || String(e);
  }
}

// Signalisiert dem Init, ob der Storage schon einen Master-Eintrag hatte.
// Wichtig, damit wir bei einem Parse-Fehler NICHT den ursprünglichen Wert
// mit leerem seedMaster() überschreiben.
let MASTER_STORAGE_HAD_VALUE = false;
let MASTER_STORAGE_CORRUPT   = false;
function loadMaster(){
  let raw = null;
  try{ raw = localStorage.getItem(MASTER_KEY); }catch(e){ /* Storage-Fehler; STORAGE_OK ist bereits false */ }
  if(!raw){ MASTER_STORAGE_HAD_VALUE = false; return seedMaster(); }
  MASTER_STORAGE_HAD_VALUE = true;
  try{
    const m = JSON.parse(raw);
    return {
      instructors: Array.isArray(m.instructors)?m.instructors:[],
      properties:  Array.isArray(m.properties)?m.properties:[],
      contractors: Array.isArray(m.contractors)?m.contractors:[],
    };
  }catch(e){
    // Der Wert ist im Storage, konnte aber nicht geparst werden – niemals mit leerem seedMaster() überschreiben!
    MASTER_STORAGE_CORRUPT = true;
    console.error('MASTER_KEY im Storage ist beschädigt – Rohwert wird NICHT ersetzt:', e);
    return seedMaster();
  }
}
// Roher (sofortiger) Schreibvorgang mit Verifikation. Wird beim Fokus-Verlust,
// beim Wechsel in den Hintergrund und beim Verlassen der Seite aufgerufen.
let MASTER_LAST_STAMP = 0;
// Verify nur beim allerersten Persist. Wenn Storage einmal nachweislich funktioniert,
// vertrauen wir ihm – Folgeschreibungen prüfen wir nicht mehr (das hatte auf Windows/
// Corporate-Setups fälschlich einen Warnbanner ausgelöst).
let MASTER_VERIFIED_ONCE = false;
function persistMasterNow(){
  try{
    const payload = JSON.stringify(app.master);
    localStorage.setItem(MASTER_KEY, payload);
    if(!MASTER_VERIFIED_ONCE){
      const back = localStorage.getItem(MASTER_KEY);
      if(back === payload){
        MASTER_VERIFIED_ONCE = true;
      } else {
        // Nur beim allerersten Fehler wirklich alarmieren, weil das ein echter
        // Storage-Ausfall ist. Kein wiederholter Trigger.
        console.warn('Stammdaten wurden nicht persistiert (Verify beim ersten Schreiben fehlgeschlagen).');
        if(STORAGE_OK){ STORAGE_OK = false; STORAGE_ERR = 'Stammdaten-Persist beim Erstversuch fehlgeschlagen'; showStorageWarning(); }
        return false;
      }
    }
    MASTER_LAST_STAMP = Date.now();
    updateStorageIndicator();
    return true;
  }catch(e){
    // Nur bei einer echten Exception loggen; Banner nur beim ersten Mal.
    console.warn('Stammdaten konnten nicht gespeichert werden.', e);
    if(STORAGE_OK && !MASTER_VERIFIED_ONCE){
      STORAGE_OK = false; STORAGE_ERR = (e && e.message)||String(e); showStorageWarning();
    }
    return false;
  }
}

const REQUIRED = [
  'apleonaName','apleonaPhone',

  '__brief', '__keys', '__sigStart',

function completenessPct(f){
  const d = f.data;
  let total = 0, done = 0;
  const req = ['apleonaName','apleonaPhone','contractor','contractorName','contractorPhone','work','start','end','object','keyHolder','sigInstructorName','sigContractorName'];
  req.forEach(k=>{ total++; if(String(d[k]||'').trim()) done++; });
  // Einweisungs-Checkboxen – nur wenn Dachzugang
  if(d.roofAccess==='yes'){
    total+=3; done += (d.briefRead?1:0)+(d.psagaTrained?1:0)+(d.psagaEquipped?1:0);
  }
  // Schlüssel
  total++; if(d.keys && d.keys.some(k=>String(k.schluesselNr||'').trim())) done++;
  // Start-Unterschriften
  total+=2; done += (d.sigInstructorStart?1:0)+(d.sigContractorStart?1:0);
  // Abschluss
  total+=2; done += (d.closeoutSig?1:0)+(d.keyReturnSig?1:0);
  return Math.round(done/total*100);
}

function canFinalize(f){
  const d = f.data;
  const need = ['apleonaName','contractor','contractorName','work','keyHolder'];
  if(need.some(k=>!String(d[k]||'').trim())) return false;
  if(!d.roofAccess) return false;
  if(d.roofAccess==='yes' && (!d.briefRead || !d.psagaTrained || !d.psagaEquipped)) return false;
  if(!d.sigInstructorStart || !d.sigContractorStart) return false;
  if(!d.closeoutSig) return false;
  if(!d.keyReturnSig || !d.keyReceiveSig) return false;
  if(unreadDocsCount(f) > 0) return false;
  return true;
}
// Zählt nur die für dieses Permit relevanten, ungelesenen Liegenschaftsdokumente
function unreadDocsCount(f){
  const docs = relevantPropertyDocs(f);
  if(!docs.length) return 0;
  const read = f.data.docsRead || {};
  return docs.filter(d=>!read[docKey(d)]).length;
}

function duplicateForm(id){

  if(!src) return;
  const nid = 'f_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,6);

  copy.id = nid;
  copy.createdAt = new Date().toISOString();

  copy.status = 'draft';
  copy.completedAt = null;
  // Unterschriften/Abschlüsse entfernen
  ['sigInstructorStart','sigContractorStart','closeoutSig','keyReturnSig','keyReceiveSig'].forEach(k=>copy.data[k]=null);
  copy.data.closeoutDate=''; copy.data.keyReturnDate=''; copy.data.closeoutName='';
  app.forms.unshift(copy);
  persist();
  render();
}
function deleteForm(id){
  const f = app.forms.find(x=>x.id===id); if(!f) return;
  if(!confirm(`Formular wirklich löschen?\n\n${f.data.contractor||'(ohne Firma)'} – ${f.data.start||''}`)) return;
  app.forms = app.forms.filter(x=>x.id!==id);
  persist();
  render();
}
function finalizeForm(){
  const f = getCurrent(); if(!f) return;
  if(!canFinalize(f)){
    alert('Das Formular ist noch nicht vollständig. Bitte alle Pflichtfelder, Einweisungs-Checkboxen und alle Unterschriften (Start, Abschluss, Schlüsselrückgabe) ausfüllen.');
    return;
  }
  f.status = 'completed';
  f.completedAt = new Date().toISOString();
  f.updatedAt = f.completedAt;
  persist();
  alert(`✔ Permit to Work als abgeschlossen markiert.\n\nPDF wurde archiviert (simuliert):\n/Liegenschaften/${f.data.object}/PermitsToWork/${(f.data.start||'heute')}_${(f.data.contractor||'Firma').replace(/\s/g,'_')}.pdf`);
  app.mode = 'dashboard';
  render();
}
function getCurrent(){ return app.forms.find(f=>f.id===app.currentId); }
function isStepSkipped(stepIdx, f){
  const s = STEPS[stepIdx];
  if(!s) return false;
  if(s.requiresRoof && (!f || f.data.roofAccess!=='yes')) return true;
  // Doc-Step nur anzeigen, wenn es relevante (für dieses Permit gültige) Dokumente gibt
  if(s.requiresDocs && (!f || relevantPropertyDocs(f).length===0)) return true;
  return false;
}
function nextVisibleStep(from, dir, f){
  let i = from + dir;
  while(i>=0 && i<STEPS.length && isStepSkipped(i,f)) i += dir;
  return i;
}
// Aktualisiert nur den Disabled-Status des Weiter-Buttons (für Live-Updates beim Tippen,
// ohne dass durch render() der Eingabefokus verloren geht).
function updateNextBtnState(f){
  try{
    const nextBtn = document.getElementById('btnNext');
    if(!nextBtn || !f) return;
    const m = stepMissing(app.step, f);
    if(m.length > 0){
      nextBtn.disabled = true;
      nextBtn.title = 'Pflichtangaben fehlen: '+m.join(', ');
      nextBtn.style.opacity = '0.55';
      nextBtn.style.cursor = 'not-allowed';
    } else {
      nextBtn.disabled = false;
      nextBtn.title = '';
      nextBtn.style.opacity = '';
      nextBtn.style.cursor = '';
    }
  }catch(e){
    /* Niemals die Navigation blocken, nur loggen */
    console.warn('updateNextBtnState-Fehler:', e);
    const nextBtn = document.getElementById('btnNext');
    if(nextBtn){ nextBtn.disabled = false; nextBtn.style.opacity = ''; nextBtn.style.cursor = ''; }
  }
}

/* ------- Pflichtfeld-Validierung pro Schritt ------- */
const STEP_VALIDATORS = {
  start: f => {
    const m = [];
    if(!String(f.data.object||'').trim()) m.push('Liegenschaft');
    return m;
  },
  order: f => {
    const m = [];
    if(!f.data.roofAccess) m.push('Dachzugang Ja/Nein');
    if(!String(f.data.apleonaName||'').trim()) m.push('Apleona-Einweiser/in');
    if(!String(f.data.contractor||'').trim()) m.push('Firma (Auftragnehmer)');
    if(!String(f.data.contractorName||'').trim()) m.push('Verantwortliche Person');
    if(!String(f.data.work||'').trim()) m.push('Geplante Arbeiten');
    return m;
  },
  docs: f => {
    const u = unreadDocsCount(f);
    return u>0 ? [u+' Liegenschaftsdokument'+(u===1?' nicht':'e nicht')+' als gelesen markiert'] : [];
  },
  shutoffs: f => {
    const m = [];
    if(f.data.shutAlarm && !String(f.data.shutAlarmGroup||'').trim()) m.push('Brandmelde-Gruppe(n)');
    return m;
  },
  riskHS: f => [],
  riskBC: f => [],
  briefing: f => {
    if(f.data.roofAccess !== 'yes') return [];
    const m = [];
    if(!f.data.briefRead) m.push('Dacheinweisung gelesen');
    if(!f.data.psagaTrained) m.push('PSAgA-Ausbildung bestätigt');
    if(!f.data.psagaEquipped) m.push('Eigene geprüfte PSAgA vorhanden');
    return m;
  },
  keys: f => {
    const m = [];
    if(!String(f.data.keyHolder||'').trim()) m.push('Schlüssel-Empfänger');
    return m;
  },
  signStart: f => {
    const m = [];
    if(!f.data.sigInstructorStart) m.push('Unterschrift Einweiser/in');
    if(!f.data.sigContractorStart) m.push('Unterschrift Ausführende/r');
    return m;
  },
  closeout: f => {
    const m = [];
    if(!f.data.closeoutSig) m.push('Abschluss-Unterschrift');
    if(!f.data.keyReturnSig) m.push('Rückgabe-Unterschrift (Ausführende/r)');
    if(!f.data.keyReceiveSig) m.push('Empfangs-Unterschrift (Apleona)');
    return m;
  },
  summary: f => [],
};
function stepMissing(stepIdx, f){
  try{
    const s = STEPS[stepIdx];
    if(!s || !f || isStepSkipped(stepIdx, f)) return [];
    const v = STEP_VALIDATORS[s.id];
    return v ? (v(f) || []) : [];
  }catch(e){
    console.warn('stepMissing-Fehler – Schritt wird als vollständig behandelt:', e);
    return [];
  }
}
function firstIncompleteStep(f){
  try{
    for(let i=0;i<STEPS.length;i++){
      if(isStepSkipped(i,f)) continue;
      if(stepMissing(i,f).length>0) return i;
    }
    return STEPS.length;
  }catch(e){
    console.warn('firstIncompleteStep-Fehler – Sperre wird aufgehoben:', e);
    return STEPS.length;
  }
}

/* Auto-Save bei jeder Änderung */
function touch(){
  const f = getCurrent(); if(!f) return;
  f.updatedAt = new Date().toISOString();
  persist();
  // Live-Bewertung des Weiter-Buttons, damit jede Eingabe (Checkbox,
  // Textfeld, Unterschrift …) den Sperrzustand sofort aktualisiert,
  // ohne dass der Eingabefokus durch ein volles render() verloren geht.
  if(typeof updateNextBtnState === 'function' && app && app.mode === 'edit'){
    updateNextBtnState(f);
  }
}

function _renderInternal(){
  const footer = document.getElementById('footerNav');
  const stepper = document.getElementById('stepper');
  const main = document.getElementById('main');
  main.innerHTML = '';

  if(app.mode === 'dashboard'){
    footer.style.display = 'none';
    stepper.innerHTML = '';
    stepper.style.display = 'none';
    document.getElementById('hdrObject').textContent = 'Übersicht';
    const chip = document.getElementById('hdrStatus');
    chip.className = 'status-chip';
    document.getElementById('hdrStatusText').textContent = app.forms.length + ' Formular' + (app.forms.length===1?'':'e');
    main.appendChild(viewDashboard());
    updateSaveIndicator();
    return;
  }

  if(app.mode === 'masterdata'){
    footer.style.display = 'none';
    stepper.innerHTML = '';
    stepper.style.display = 'none';
    document.getElementById('hdrObject').textContent = 'Stammdaten';
    const chip = document.getElementById('hdrStatus');
    chip.className = 'status-chip';
    document.getElementById('hdrStatusText').textContent =
      app.master.instructors.length+' Einweiser · '+
      app.master.properties.length+' Liegenschaften · '+
      app.master.contractors.length+' Auftragnehmer';
    main.appendChild(viewMasterdata());
    updateSaveIndicator();
    return;
  }

  // edit / view
  footer.style.display = 'flex';
  stepper.style.display = 'block';
  const f = getCurrent();
  if(!f){ app.mode='dashboard'; render(); return; }
  document.getElementById('hdrObject').textContent = (f.data.contractor||'Neues Formular') + ' · ' + (f.data.object||'');
  const chip = document.getElementById('hdrStatus');
  chip.className = 'status-chip'+(f.status==='completed'?' done':'');
  document.getElementById('hdrStatusText').textContent = f.status==='completed'?'Abgeschlossen':'Entwurf · '+completenessPct(f)+'%';

  document.getElementById('stepLabel').textContent = app.step+1;
  document.getElementById('stepTotal').textContent = STEPS.length;
  document.getElementById('pctLabel').textContent = completenessPct(f)+'%';
  document.getElementById('stepBar').style.width = completenessPct(f)+'%';
  document.getElementById('btnBack').style.visibility = app.step===0?'hidden':'visible';
  const nextBtn = document.getElementById('btnNext');
  if(app.step===STEPS.length-1){ nextBtn.textContent='Als abgeschlossen markieren ✓'; nextBtn.className='btn btn-success'; }
  else{ nextBtn.textContent='Weiter →'; nextBtn.className='btn btn-primary'; }
  // Generische Pflichtprüfung: aktueller Schritt vollständig?
  updateNextBtnState(f);

  // Stepper darf den Render nie blocken
  try{ renderStepper(f); }catch(e){ console.warn('Stepper-Render-Fehler:', e); }

  const step = STEPS[app.step];
  if(!step){ throw new Error('Schritt-Index ausser Bereich: '+app.step+' (von '+STEPS.length+')'); }

  // Jeder Schritt einzeln abgesichert: ein Fehler im Inhalt blendet
  // einen Hinweis ein, aber lässt Navigation/Stepper intakt.
  try{
    switch(step.id){
      case 'start': main.appendChild(viewStart(f)); break;
      case 'order': main.appendChild(viewOrder(f)); break;
      case 'docs': main.appendChild(viewDocs(f)); break;
      case 'shutoffs': main.appendChild(viewShutoffs(f)); break;
      case 'riskHS': main.appendChild(viewRisk(f,'HS')); break;
      case 'riskBC': main.appendChild(viewRisk(f,'BC')); break;
      case 'briefing': main.appendChild(viewBriefing(f)); break;
      case 'keys': main.appendChild(viewKeys(f)); break;
      case 'signStart': main.appendChild(viewSignStart(f)); break;
      case 'closeout': main.appendChild(viewCloseout(f)); break;
      case 'summary': main.appendChild(viewSummary(f)); break;
      default: throw new Error('Unbekannter Schritt: '+step.id);
    }
  }catch(e){
    console.error('View-Fehler im Schritt «'+step.id+'»:', e);
    const errCard = document.createElement('div');
    errCard.style.cssText = 'background:#fff;border-left:4px solid #C9382C;border-radius:12px;padding:20px;margin:20px 0;box-shadow:0 2px 6px rgba(15,37,71,.06);';
    errCard.innerHTML =
      '<h2 style="margin:0 0 8px 0;color:#C9382C;font-size:18px;">Inhalt konnte nicht angezeigt werden</h2>'+
      '<p>Beim Aufbau von Schritt «'+ (step.label||step.id) +'» ist ein Fehler aufgetreten. Sie können mit «Zurück» oder über die Schrittnavigation weitermachen.</p>'+
      '<details><summary>Technisches Detail</summary><pre style="white-space:pre-wrap;background:#F4F6FA;padding:8px;border-radius:6px;font-size:11px;">'+
        String((e&&e.message)||e).replace(/</g,'&lt;')+
      '</pre></details>';
    main.appendChild(errCard);
  }
  main.scrollTop = 0;
  try{ initSignaturePads(f); }catch(e){ console.warn('SignaturePad-Init-Fehler:', e); }
  updateSaveIndicator();
}

function renderStepper(f){
  const nav = document.getElementById('stepper');
  nav.innerHTML = '';
  const home = el('div',{class:'nav-home',onclick:()=>{ app.mode='dashboard'; render(); }},[
    el('span',{class:'num',style:{background:'var(--primary)'}},'🏠'),
    el('span',{},'Übersicht')
  ]);
  nav.appendChild(home);
  const firstIncomplete = firstIncompleteStep(f);
  STEPS.forEach((s,i)=>{
    const skipped = isStepSkipped(i,f);
    // Vorwärts gesperrt, wenn vorheriger Schritt unvollständig.
    // Zurück darf der User immer (i <= app.step).
    const locked = !skipped && i > app.step && i > firstIncomplete;
    const isDone = !skipped && i < app.step && stepMissing(i,f).length===0;
    const cls = 'step'
      + (i===app.step?' active':'')
      + (isDone?' done':'')
      + (skipped?' skipped':'')
      + (locked?' locked':'');
    const onclick = (skipped || locked) ? null : ()=>{ app.step=i; render(); };
    const e = el('div',{class:cls, onclick});
    if(locked){
      // Click-Sperre + Hinweis, was fehlt
      e.addEventListener('click', ev=>{
        ev.preventDefault();
        const blockMissing = stepMissing(firstIncomplete, f);
        const blockName = STEPS[firstIncomplete] ? STEPS[firstIncomplete].label : '';
        alert('Dieser Schritt ist noch gesperrt. Bitte zuerst Schritt «'+blockName+'» vervollständigen:\n• '+blockMissing.join('\n• '));
      });
      e.title = 'Gesperrt – «'+(STEPS[firstIncomplete]?STEPS[firstIncomplete].label:'')+'» zuerst ausfüllen';
    }
    let tag = '';
    if(skipped) tag = '<span class="skip-tag">übersprungen</span>';
    else if(locked) tag = '<span class="lock-tag">🔒 gesperrt</span>';
    const numContent = skipped ? '–' : (locked ? '🔒' : (isDone ? '✓' : i+1));
    e.innerHTML = `<div class="num">${numContent}</div><span>${s.label}${tag}</span>`;
    nav.appendChild(e);
  });
}

function renderList(){

    .filter(f=>{

        const blob = (f.data.contractor+' '+f.data.contractorName+' '+f.data.object+' '+f.data.work+' '+f.data.apleonaName).toLowerCase();

    `;
    if(f.status!=='completed'){
      const bar = el('div',{class:'progressbar',style:{width:'100%',marginTop:'8px'}});
      bar.appendChild(el('div',{style:{width:pct+'%'}}));
      left.appendChild(bar);
    }
    left.appendChild(meta);
    card.appendChild(left);

    const right = el('div',{class:'actions'});
    if(f.status==='draft'){
      right.appendChild(iconBtn('▶','Weiterarbeiten',()=>openForm(f.id,'edit')));
    }else{
      right.appendChild(iconBtn('👁','Ansehen',()=>openForm(f.id,'edit')));
      right.appendChild(iconBtn('📄','PDF herunterladen',()=>downloadPdf(f)));
      right.appendChild(iconBtn('📤','Teilen (Mail/Teams)',()=>shareForm(f)));
    }
    right.appendChild(iconBtn('📋','Als Vorlage duplizieren',()=>duplicateForm(f.id)));
    right.appendChild(iconBtn('🗑','Löschen',()=>deleteForm(f.id),'danger'));
    card.appendChild(right);
    root.appendChild(card);
  });
}

function iconBtn(icon, title, onclick, cls){
  return el('button',{class:'icon-btn '+(cls||''),title,onclick:(e)=>{e.stopPropagation(); onclick();}}, icon);
}

function readFileAsDataURL(file){
  return new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload = ()=>res(r.result);
    r.onerror = ()=>rej(r.error || new Error('FileReader error'));
    r.readAsDataURL(file);
  });
}
function dataUrlToBlob(dataUrl){
  const [meta,b64] = dataUrl.split(',');
  const mime = (meta.match(/data:([^;]+)/)||[])[1] || 'application/octet-stream';
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr],{type:mime});
}
function downloadDataUrl(d){
  const a = document.createElement('a');
  a.href = d.data; a.download = d.name;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
// Stabiler Schlüssel pro Dokument (id falls vorhanden, sonst Fallback auf Name+Größe)
function docKey(d){ return d.id || ('legacy_'+(d.name||'')+'_'+(d.size||0)); }
// Liefert die für dieses Permit relevanten Liegenschaftsdokumente:
//   - allgemeine Dokumente (kein Dachbezug) sind immer relevant
//   - Dach-Dokumente nur, wenn unter «Art der Arbeiten» Dachzugang/Absturzkante = JA
function relevantPropertyDocs(f){
  const prop = (typeof findPropertyByName==='function') ? findPropertyByName(f.data.object) : null;
  if(!prop || !prop.docs || !prop.docs.length) return [];
  const roofYes = f.data.roofAccess === 'yes';
  return prop.docs.filter(d => !d.roofRelated || roofYes);
}
// Liefert die zu nutzende Vorsorgemassnahme für ein Risiko:
//   1. liegenschaftsspezifischer Override (Stammdaten), falls vorhanden
//   2. sonst Default aus HS_RISKS / BC_RISKS
function riskMeasureFor(f, type, key){
  const prop = (typeof findPropertyByName==='function') ? findPropertyByName(f.data.object) : null;
  const ov = prop && prop.riskMeasures && prop.riskMeasures[type] && prop.riskMeasures[type][key];
  if(typeof ov === 'string' && ov.trim().length) return ov;
  const list = type==='HS' ? HS_RISKS : BC_RISKS;
  const r = list.find(x => x.key===key);
  return r ? r.measure : '';
}
// True, wenn pro Risiko ein Override gesetzt ist (für UI-Anzeige)
function hasRiskOverride(prop, type, key){
  return !!(prop && prop.riskMeasures && prop.riskMeasures[type] && typeof prop.riskMeasures[type][key]==='string' && prop.riskMeasures[type][key].trim().length);
}
// Öffnet ein Dokument in einem neuen Tab. Erst Versuch via Blob-URL (zuverlässig in
// Desktop-Browsern), Fallback auf data:-URL (für eingeschränkte Umgebungen).
function openDocInNewTab(d){
  try{
    const blob = dataUrlToBlob(d.data);
    const url = URL.createObjectURL(blob);
    const w = window.open(url, '_blank');
    if(!w){
      // Pop-up blockiert → versuche dieselbe Tab-URL
      window.location.href = url;
    }
    setTimeout(()=>{ try{ URL.revokeObjectURL(url); }catch(e){} }, 60*1000);
    return;
  }catch(e){ /* Fallback unten */ }
  try{ window.open(d.data, '_blank'); }
  catch(e){ downloadDataUrl(d); }
}
function formatBytes(b){ if(!b) return ''; if(b<1024) return '('+b+' B)'; if(b<1024*1024) return '('+(b/1024).toFixed(1)+' kB)'; return '('+(b/1024/1024).toFixed(1)+' MB)'; }

function trimText(s,n){ return s.length>n ? s.slice(0,n-1)+'…' : s; }
function fmtRelative(iso){
  const d = new Date(iso), now = new Date();
  const diff = (now - d)/1000;
  if(diff<60) return 'gerade eben';
  if(diff<3600) return Math.floor(diff/60)+' Min';
  if(diff<86400) return Math.floor(diff/3600)+' Std';
  if(diff<86400*7) return Math.floor(diff/86400)+' Tage';
  return d.toLocaleDateString('de-CH');
}

/* ------- Helpers ------- */
function el(tag, attrs={}, children=[]){
  const e = document.createElement(tag);
  for(const k in attrs){
    const v = attrs[k];
    if(v==null) continue; // null/undefined Werte ignorieren – verhindert iOS-Safari-Crash bei addEventListener(null)
    if(k==='style' && typeof v==='object') Object.assign(e.style, v);
    else if(k.startsWith('on') && typeof v==='function') e.addEventListener(k.slice(2).toLowerCase(), v);
    else if(k==='html') e.innerHTML = v;
    else if(k==='value') e.value = v;
    else if(typeof v==='boolean'){ if(v) e.setAttribute(k,''); }
    else e.setAttribute(k, v);
  }
  (Array.isArray(children)?children:[children]).forEach(c=>{
    if(c==null) return;
    e.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return e;
}
function field(label, input){
  const wrap = el('div');
  wrap.appendChild(el('label',{},label));
  wrap.appendChild(input);
  return wrap;
}
function textInput(f, key, placeholder='', type='text'){
  const inp = el('input',{type,value:f.data[key]||'',placeholder});
  inp.addEventListener('input', e=>{
    f.data[key]=e.target.value;

function viewDocs(f){
  const wrap = el('div');
  const docs = relevantPropertyDocs(f);
  const prop = findPropertyByName(f.data.object);
  if(!docs.length){
    // Sollte normalerweise nicht erreichbar sein (Step ist dann skipped),
    // aber Fallback für Direktnavigation:
    const card = el('div',{class:'card'});
    card.appendChild(el('h2',{},'Pflichtdokumente'));
    card.appendChild(el('p',{class:'subtitle'},'Für diese Liegenschaft sind aktuell keine relevanten Dokumente zu bestätigen.'));
    wrap.appendChild(card);
    return wrap;
  }

  if(!f.data.docsRead) f.data.docsRead = {};
  const total = docs.length;
  const readCount = docs.filter(d=>!!f.data.docsRead[docKey(d)]).length;
  const allRead = readCount === total;

  const card = el('div',{id:'docCard',class:'card',style:{borderLeft:'4px solid '+(allRead?'var(--ok)':'var(--danger)')}});
  const hdr = el('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'8px',flexWrap:'wrap'}});
  hdr.appendChild(el('h2',{style:{margin:'0'}},'Pflichtdokumente ('+readCount+' / '+total+' gelesen)'));
  const statusPill = allRead
    ? el('span',{class:'pill tief',style:{fontWeight:'600'}},'✓ Alle gelesen')
    : el('span',{class:'pill hoch',style:{fontWeight:'600'}},'⚠ Pflicht – ungelesen');
  hdr.appendChild(statusPill);
  card.appendChild(hdr);
  card.appendChild(el('p',{class:'subtitle',style:{margin:'6px 0 10px',fontWeight:'600',color: allRead?'var(--muted)':'var(--danger)'}}, allRead ? 'Alle Dokumente bestätigt – Sie können fortfahren.' : '⚠ Pflichtfeld: Bitte jedes Dokument anklicken, durchlesen und als «gelesen» markieren. Erst dann ist der Weiter-Button aktiv.'));

  // Wenn Dach-Dokumente vorhanden sind, aber Dachzugang = NEIN: Hinweis
  if(prop && prop.docs){
    const hiddenRoof = prop.docs.filter(d=>d.roofRelated).length;
    if(hiddenRoof && f.data.roofAccess !== 'yes'){
      card.appendChild(el('div',{class:'banner-info',style:{marginTop:'4px',marginBottom:'10px'},
        html:'ℹ️ '+hiddenRoof+' dachbezogene Dokument'+(hiddenRoof===1?' ist':'e sind')+' für dieses Permit nicht relevant (Dachzugang in Schritt 2 = Nein) und werden weder hier angezeigt noch beim Mailversand angehängt.'}));
    }
  }

  const dl = el('div',{style:{display:'flex',flexDirection:'column',gap:'6px'}});
  docs.forEach(d=>{
    const k = docKey(d);
    const isRead = !!f.data.docsRead[k];
    const row = el('div',{style:{display:'flex',gap:'10px',alignItems:'center',padding:'8px 10px',background:'var(--bg)',borderRadius:'6px',border:'1px solid '+(isRead?'var(--ok)':'transparent')}});

    // Linker Block: Icon + Link + ggfs. Dach-Badge
    const left = el('div',{style:{flex:'1',display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}});
    const link = el('a',{href:'#',style:{color:'var(--primary)',fontWeight:'600',textDecoration:'none'}}, '📄 '+d.name+' '+formatBytes(d.size));
    link.addEventListener('click',e=>{ e.preventDefault(); openDocInNewTab(d); });
    left.appendChild(link);
    if(d.roofRelated) left.appendChild(el('span',{class:'pill',style:{background:'#fff4d6',color:'#8a5a00',fontWeight:'600',fontSize:'11px'}},'🪜 Dach'));
    row.appendChild(left);

    row.appendChild(el('button',{class:'btn btn-ghost',type:'button',style:{padding:'2px 8px'},title:'In neuem Tab öffnen',onclick:()=>openDocInNewTab(d)},'👁'));
    row.appendChild(el('button',{class:'btn btn-ghost',type:'button',style:{padding:'2px 8px'},title:'Herunterladen',onclick:()=>downloadDataUrl(d)},'⬇'));

    const cb = el('input',{type:'checkbox',id:'docread_'+k,style:{transform:'scale(1.2)',marginLeft:'4px'}});
    if(isRead) cb.checked = true;
    cb.addEventListener('change', ()=>{
      if(!f.data.docsRead) f.data.docsRead = {};
      if(cb.checked) f.data.docsRead[k] = true;
      else delete f.data.docsRead[k];
      touch();
      render();
    });
    const lbl = el('label',{for:'docread_'+k,style:{cursor:'pointer',userSelect:'none',fontSize:'13px',fontWeight:'600'}},'gelesen');
    row.appendChild(cb);
    row.appendChild(lbl);

    dl.appendChild(row);
  });
  card.appendChild(dl);
  card.appendChild(el('div',{style:{marginTop:'8px',fontSize:'12px',color:'var(--muted)'}},'Diese Dokumente werden beim Teilen/Mailversand automatisch angehängt.'));
  wrap.appendChild(card);
  return wrap;
}

  actions.appendChild(el('button',{class:'btn btn-ghost',type:'button',onclick:()=>{
    const c = box.querySelector('canvas'); c.getContext('2d').clearRect(0,0,c.width,c.height);
    box.querySelector('.sig-placeholder').style.display='block';
    f.data[dataKey]=null; touch();
  }},'↻ Zurücksetzen'));
  actions.appendChild(el('span',{style:{fontSize:'12px',color:'var(--muted)'}},'Rechtshinweis: Für rechtssichere Signatur Adobe Sign / DocuSign.'));

function initSignaturePads(f){
  document.querySelectorAll('.sig-box').forEach(box=>{
    const canvas = box.querySelector('canvas');
    const ph = box.querySelector('.sig-placeholder');
    const dataKey = box.getAttribute('data-key');
    const rect = box.getBoundingClientRect();
    canvas.width = rect.width * (window.devicePixelRatio||1);
    canvas.height = rect.height * (window.devicePixelRatio||1);
    const ctx = canvas.getContext('2d');
    ctx.scale(window.devicePixelRatio||1, window.devicePixelRatio||1);
    ctx.lineWidth=2.2; ctx.lineCap='round'; ctx.strokeStyle='#1a2840';
    let drawing=false, last=null;
    if(f.data[dataKey]){
      const img=new Image();
      img.onload=()=>ctx.drawImage(img,0,0,rect.width,rect.height);
      img.src=f.data[dataKey];
      ph.style.display='none';
    }
    const getPos = ev=>{
      const r = canvas.getBoundingClientRect();
      const p = ev.touches ? ev.touches[0] : ev;
      return [p.clientX-r.left, p.clientY-r.top];
    };
    const down = e => { drawing=true; last=getPos(e); ph.style.display='none'; e.preventDefault(); };
    const move = e => { if(!drawing) return; const [x,y]=getPos(e); ctx.beginPath(); ctx.moveTo(last[0],last[1]); ctx.lineTo(x,y); ctx.stroke(); last=[x,y]; e.preventDefault(); };
    const up = ()=>{ if(drawing){ drawing=false; f.data[dataKey]=canvas.toDataURL('image/png'); touch(); }};
    canvas.addEventListener('mousedown',down); canvas.addEventListener('mousemove',move); canvas.addEventListener('mouseup',up); canvas.addEventListener('mouseleave',up);
    canvas.addEventListener('touchstart',down); canvas.addEventListener('touchmove',move); canvas.addEventListener('touchend',up);
  });
}

function fmtDate(s){ if(!s) return '–'; const d=new Date(s); return isNaN(d)?s:d.toLocaleDateString('de-CH'); }
function fmtDateTime(s){
  if(!s) return '–';
  const d=new Date(s); if(isNaN(d)) return s;
  // Wenn keine Zeitkomponente vorhanden ist (z. B. reines Datum), nur Datum zurückgeben
  if(!/T\d/.test(String(s))) return d.toLocaleDateString('de-CH');
  return d.toLocaleDateString('de-CH')+' '+d.toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'});
}
function pdfFilename(f){
  const date = (f.data.start || (f.completedAt? f.completedAt.slice(0,10) : new Date().toISOString().slice(0,10)));
  const firma = (f.data.contractor||'Firma').replace(/[^a-zA-Z0-9ÄÖÜäöü-]+/g,'_').slice(0,40);
  return `PermitToWork_${date}_${firma}.pdf`;
}

function generatePdf(f){
  if(!window.jspdf){ alert('PDF-Bibliothek konnte nicht geladen werden.\nBitte einmal mit Internetverbindung öffnen, dann ist sie zwischengespeichert.'); return null; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'mm', format:'a4' });
  const W = doc.internal.pageSize.getWidth();
  const M = 14;
  const d = f.data;
  let y = M;

  // Kopfzeile (Apleona-Navy mit rotem Wordmark + roter Trennlinie)
  doc.setFillColor(15,37,71); doc.rect(0,0,W,22,'F');
  doc.setFillColor(233,78,63); doc.rect(0,22,W,1.2,'F'); // rote Akzentlinie
  doc.setTextColor(233,78,63); doc.setFontSize(13); doc.setFont('helvetica','bold');
  doc.text('APLEONA', M, 10);
  doc.setTextColor(255,255,255); doc.setFontSize(13); doc.setFont('helvetica','bold');
  doc.text('Permit to Work', M+34, 10);
  doc.setFontSize(10); doc.setFont('helvetica','normal');
  doc.text(d.object||'', M, 16);
  doc.setFontSize(9);
  const status = f.status==='completed' ? 'ABGESCHLOSSEN '+(f.completedAt? '· '+fmtDate(f.completedAt):'') : 'ENTWURF';
  doc.text(status, W-M, 10, {align:'right'});
  doc.text('Erstellt: '+ fmtDate(f.createdAt), W-M, 16, {align:'right'});
  doc.setTextColor(0,0,0);
  y = 30;

  const section = (title)=>{
    if(y>270){ doc.addPage(); y=M; }
    doc.setFillColor(232,237,244); doc.rect(M, y, W-2*M, 7, 'F'); // Apleona Navy soft
    doc.setFontSize(11); doc.setFont('helvetica','bold'); doc.setTextColor(15,37,71);
    doc.text(title, M+2, y+5);
    doc.setTextColor(0,0,0); doc.setFont('helvetica','normal');
    y += 10;
  };
  const kv = (rows)=>{
    doc.autoTable({
      startY: y, margin:{left:M,right:M},
      body: rows.map(([k,v])=>[k,v||'–']),
      theme:'plain',
      styles:{fontSize:9, cellPadding:1.5, valign:'top'},
      columnStyles:{0:{cellWidth:55, fontStyle:'bold', textColor:[107,116,128]}, 1:{cellWidth:'auto'}},
    });
    y = doc.lastAutoTable.finalY + 4;
  };

  // Auftragsdetails
  section('Auftragsdetails');
  kv([
    ['Objekt', d.object],
    ['Apleona Verantwortlicher', [d.apleonaName, d.apleonaPhone, d.apleonaEmail].filter(Boolean).join(' · ')],
    ['Auftragnehmer Firma', d.contractor],
    ['Auftragnehmer Verantwortlicher', [d.contractorName, d.contractorPhone, d.contractorEmail].filter(Boolean).join(' · ')],
    ['Anzahl Helfer', d.helpers],
    ['Geplante Arbeiten', d.work],
    ['Zeitraum', fmtDate(d.start)+' bis '+fmtDate(d.end)],
    ['Anlage / Gebäude / Raum', [d.plant,d.building,d.floorRoom].filter(Boolean).join(' / ')],
  ]);

  // Abschaltungen
  section('Abschaltungen');
  const sh = [
    d.shutVent && 'Lüftung / Klima / Heizung',
    d.shutFire && 'Brandlöschanlagen',
    d.shutAlarm && ('Brandmelder'+(d.shutAlarmGroup?' – Gruppe(n): '+d.shutAlarmGroup:'')),
    d.shutOther && ('Andere: '+d.shutOther),
  ].filter(Boolean);
  doc.setFontSize(10);
  doc.text(sh.length? '• '+sh.join('\n• ') : 'Keine Abschaltungen erforderlich', M, y);
  y += sh.length ? 4*Math.max(sh.length,1) : 5;
  y += 4;

  // Risiko-Tabellen
  const riskTable = (title, list, overallVal, dataObj, type) => {
    section(title);
    let overallTxt, overallCol, headStufe;
    if(type==='BC'){
      const present = overallVal==='vorhanden';
      overallTxt = present ? 'VORHANDEN' : 'NICHT VORHANDEN';
      overallCol = present ? [201,42,42] : [47,158,68];
      headStufe = 'Status';
    } else {
      overallTxt = overallVal==='hoch'?'HOCH':overallVal==='mittel'?'MITTEL':'TIEF';
      overallCol = overallVal==='hoch'?[201,42,42]: overallVal==='mittel'?[240,140,0]:[47,158,68];
      headStufe = 'Stufe';
    }
    doc.autoTable({
      startY: y, margin:{left:M,right:M},
      head:[['Risiko',headStufe,'Vorsorgemassnahme']],
      body:[
        [{content:'Gesamteinschätzung', styles:{fontStyle:'bold'}}, {content:overallTxt, styles:{fontStyle:'bold', textColor:255, fillColor:overallCol, halign:'center'}}, ''],
        ...list.map(r=>{
          const v = dataObj ? dataObj[r.key] : null;
          let txt='–', col=[200,200,200], txtCol=80;
          if(type==='BC'){
            if(v==='vorhanden'){ txt='Vorhanden'; col=[201,42,42]; txtCol=255; }
            else if(v==='nicht_vorhanden'){ txt='Nicht vorhanden'; col=[47,158,68]; txtCol=255; }
          } else {
            if(v==='hoch'){ txt='HOCH'; col=[201,42,42]; txtCol=255; }
            else if(v==='mittel'){ txt='MITTEL'; col=[240,140,0]; txtCol=255; }
            else if(v==='tief'){ txt='TIEF'; col=[47,158,68]; txtCol=255; }
          }
          return [r.label, {content:txt, styles:{textColor: txtCol, fillColor: col, halign:'center'}}, riskMeasureFor(f, type, r.key)];
        }),
      ],
      theme:'grid',
      headStyles:{fillColor:[15,37,71], textColor:255, fontSize:9},
      styles:{fontSize:8, cellPadding:1.6, valign:'middle'},
      columnStyles:{0:{cellWidth:55}, 1:{cellWidth:28, halign:'center'}, 2:{cellWidth:'auto'}},
    });
    y = doc.lastAutoTable.finalY + 4;
    if(type==='HS' && overallVal==='hoch'){
      doc.setFillColor(255,240,240); doc.rect(M, y, W-2*M, 6, 'F');
      doc.setTextColor(201,42,42); doc.setFontSize(9); doc.setFont('helvetica','bold');
      doc.text('⚠ Gesamtrisiko HOCH – Kunde wurde informiert', M+2, y+4);
      doc.setTextColor(0,0,0); doc.setFont('helvetica','normal');
      y += 9;
    }
    if(type==='BC' && overallVal==='vorhanden'){
      doc.setFillColor(255,240,240); doc.rect(M, y, W-2*M, 6, 'F');
      doc.setTextColor(201,42,42); doc.setFontSize(9); doc.setFont('helvetica','bold');
      doc.text('⚠ BC-Risiken vorhanden – Massnahmen sind zu beachten', M+2, y+4);
      doc.setTextColor(0,0,0); doc.setFont('helvetica','normal');
      y += 9;
    }
  };
  riskTable('Risikobeurteilung Health & Safety', HS_RISKS, d.riskHSOverall, d.riskHS, 'HS');
  riskTable('Risikobeurteilung Business Continuity', BC_RISKS, d.riskBCOverall, d.riskBC, 'BC');

  // Liegenschaftsdokumente – Lesebestätigung (nur für dieses Permit relevante)
  const _docsPdf = relevantPropertyDocs(f);
  if(_docsPdf.length){
    section('Liegenschaftsdokumente – Lesebestätigung');
    const _read = d.docsRead || {};
    doc.autoTable({
      startY: y, margin:{left:M,right:M},
      head:[['Dokument','Bezug','Status']],
      body: _docsPdf.map(dd=>{
        const ok = !!_read[docKey(dd)];
        const txt = ok ? '✓ Gelesen' : '✗ Nicht bestätigt';
        const col = ok ? [47,158,68] : [201,42,42];
        return [dd.name||'Dokument', dd.roofRelated?'Dach':'Allgemein', {content:txt, styles:{textColor:255, fillColor:col, halign:'center', fontStyle:'bold'}}];
      }),
      theme:'grid',
      headStyles:{fillColor:[15,37,71], textColor:255, fontSize:9},
      styles:{fontSize:9, cellPadding:1.6, valign:'middle'},
      columnStyles:{0:{cellWidth:'auto'}, 1:{cellWidth:22, halign:'center'}, 2:{cellWidth:38, halign:'center'}},
    });
    y = doc.lastAutoTable.finalY + 6;
  }

  // Einweisung – nur wenn Dachzugang relevant ist
  if(d.roofAccess === 'yes'){
    section('Dacheinweisung – Einweisungs-Bestätigung');
    kv([
      ['Dacheinweisung gelesen', d.briefRead?'✓ ja':'✗ nein'],
      ['PSAgA-Ausbildung bestätigt', d.psagaTrained?'✓ ja':'✗ nein'],
      ['Eigene geprüfte PSAgA vorhanden', d.psagaEquipped?'✓ ja':'✗ nein'],
    ]);
  } else {
    section('Dacheinweisung');
    doc.setFontSize(9);
    doc.text('Nicht erforderlich – es wurde weder das Dach noch eine Absturzkante (<2 m) betreten.', M, y);
    y += 6;
  }

  // Schlüssel
  section('Schlüsselübergabe');
  kv([
    ['Empfänger', [d.keyHolder, d.keyHolderPhone].filter(Boolean).join(' · ')],
  ]);
  doc.autoTable({
    startY: y, margin:{left:M,right:M},
    head: [['Nr.','Fabrikat','Anlage','Schlüssel Nr.','Art','Anzahl']],
    body: d.keys.map((k,i)=>[i+1, k.fabrikat||'–', k.anlage||'–', k.schluesselNr||'–', k.art||'–', k.anzahl||'–']),
    theme:'grid',
    headStyles:{fillColor:[15,37,71], textColor:255, fontSize:9},
    styles:{fontSize:9, cellPadding:1.6},
  });
  y = doc.lastAutoTable.finalY + 6;

  // Unterschriften Start
  section('Unterschriften – Start der Arbeiten');
  doc.setFontSize(9);
  const sigBox = (label, name, role, sig, x)=>{
    doc.setDrawColor(200); doc.rect(x, y, 88, 30);
    if(sig){
      try{ doc.addImage(sig, 'PNG', x+2, y+2, 84, 18); }catch(e){}
    } else {
      doc.setTextColor(150); doc.text('(noch nicht unterschrieben)', x+44, y+12, {align:'center'}); doc.setTextColor(0);
    }
    doc.setFontSize(7); doc.setTextColor(107,116,128);
    doc.text(label.toUpperCase(), x+2, y+24);
    doc.setFontSize(9); doc.setTextColor(0);
    doc.text((name||'–')+' · '+(role||''), x+2, y+28);
  };
  sigBox('Einweiser/in (Apleona)', d.sigInstructorName, d.sigInstructorRole, d.sigInstructorStart, M);
  sigBox('Ausführende Person/Firma', d.sigContractorName, d.sigContractorRole, d.sigContractorStart, M+94);
  y += 34;
  doc.setFontSize(7); doc.setTextColor(107,116,128);
  doc.text('Mit der Unterschrift der ausführenden Person/Firma wird zusätzlich der Erhalt der oben aufgeführten Schlüssel bestätigt.', M, y);
  doc.setTextColor(0,0,0); y += 4;
  doc.setFontSize(8); doc.text('Datum/Zeit der Einweisung: '+(d.sigStartDate? d.sigStartDate.replace('T',' '):'–'), M, y); y+=6;

  // Abschluss + Rückgabe
  section('Abschluss der Arbeiten & Schlüsselrückgabe');
  doc.setFontSize(9);
  doc.text('Arbeiten abgeschlossen am: '+fmtDateTime(d.closeoutDate)+' durch '+(d.closeoutName||'–'), M, y); y+=4;
  sigBox('Unterschrift Einweiser/in (Abschluss)', d.closeoutName, '', d.closeoutSig, M); y += 34;
  doc.text('Schlüsselrückgabe am: '+fmtDate(d.keyReturnDate), M, y); y+=4;
  sigBox('Rückgabe durch Ausführenden', d.contractorName, '', d.keyReturnSig, M);
  sigBox('Empfangen durch Apleona', d.apleonaName, '', d.keyReceiveSig, M+94);
  y += 36;

  // Footer auf jeder Seite
  const total = doc.internal.getNumberOfPages();
  for(let i=1;i<=total;i++){
    doc.setPage(i);
    doc.setDrawColor(220); doc.line(M, 285, W-M, 285);
    doc.setFontSize(8); doc.setTextColor(120);
    doc.text('Permit to Work – '+(d.object||''), M, 290);
    doc.text('Seite '+i+' / '+total, W-M, 290, {align:'right'});
    doc.setTextColor(0);
  }

  return doc;
}

function downloadPdf(f){
  const doc = generatePdf(f); if(!doc) return;
  doc.save(pdfFilename(f));
}

function emailSubject(f){
  return `Permit to Work ${f.data.object||''} · ${f.data.contractor||''} · ${fmtDate(f.data.start)}`;
}
function emailBody(f){
  const d = f.data;
  const lines = [];
  lines.push('Sehr geehrte Damen und Herren');
  lines.push('');
  lines.push('Anbei die Zusammenfassung des Permits to Work'+(d.roofAccess==='yes'?' inkl. Dacheinweisung':'')+'. Das vollständige PDF ist '+(navigator.share?'angehängt bzw. wird separat geteilt':'separat anzuhängen')+'.');
  lines.push('');
  lines.push('— ZUSAMMENFASSUNG —');
  lines.push('Objekt: '+(d.object||'–'));
  lines.push('Datum: '+fmtDate(d.start)+(d.end&&d.end!==d.start?' bis '+fmtDate(d.end):''));
  lines.push('');
  lines.push('Auftraggeber Apleona: '+[d.apleonaName,d.apleonaPhone,d.apleonaEmail].filter(Boolean).join(' · '));
  lines.push('Auftragnehmer: '+[d.contractor,d.contractorName,d.contractorPhone,d.contractorEmail].filter(Boolean).join(' · '));
  lines.push('Geplante Arbeiten: '+(d.work||'–'));
  lines.push('Dachzugang / Absturzkante: '+(d.roofAccess==='yes'?'JA – Dacheinweisung durchgeführt':d.roofAccess==='no'?'NEIN – Dacheinweisung nicht erforderlich':'–'));
  lines.push('');
  lines.push('Risiko Health & Safety: '+(d.riskHSOverall||'–').toUpperCase());
  const bcOverallTxt = d.riskBCOverall==='vorhanden' ? 'VORHANDEN' : d.riskBCOverall==='nicht_vorhanden' ? 'NICHT VORHANDEN' : '–';
  lines.push('Risiko Business Continuity: '+bcOverallTxt);
  lines.push('');
  // Nur die für dieses Permit relevanten Liegenschaftsdokumente erwähnen (mit Lese-Status)
  const _docsMail = relevantPropertyDocs(f);
  if(_docsMail.length){
    const _read = d.docsRead || {};
    lines.push('— LIEGENSCHAFTSDOKUMENTE (mitgesendet) —');
    _docsMail.forEach(doc=>{
      const ok = !!_read[docKey(doc)];
      const tag = doc.roofRelated ? ' [Dach]' : '';
      lines.push('  '+(ok?'✓':'✗')+' '+(doc.name||'Dokument')+tag+' '+(ok?'(gelesen)':'(nicht bestätigt)'));
    });
    lines.push('');
  }
  lines.push('Schlüssel ausgegeben an '+(d.keyHolder||'–')+':');
  d.keys.filter(k=>k.schluesselNr).forEach(k=>lines.push('  • '+(k.schluesselNr||'')+' ('+(k.fabrikat||'')+', '+(k.anlage||'')+', '+(k.art||'')+', '+(k.anzahl||'1')+'×)'));
  if(!d.keys.some(k=>k.schluesselNr)) lines.push('  (keine erfasst)');
  lines.push('');
  lines.push('Unterschrift Einweiser: '+(d.sigInstructorStart?'✓ '+(d.sigInstructorName||''):'offen'));
  lines.push('Unterschrift Ausführender: '+(d.sigContractorStart?'✓ '+(d.sigContractorName||''):'offen'));
  if(f.status==='completed'){
    lines.push('Arbeiten abgeschlossen: ✓ '+fmtDateTime(d.closeoutDate));
    lines.push('Schlüssel zurück: ✓ '+fmtDate(d.keyReturnDate));
  }
  lines.push('');
  lines.push('Freundliche Grüsse');
  lines.push(d.apleonaName||'Apleona Schweiz AG');
  return lines.join('\n');
}

function sendEmail(f){
  const to = [f.data.apleonaEmail, f.data.contractorEmail].filter(Boolean).join(',');
  const subject = encodeURIComponent(emailSubject(f));
  const body = encodeURIComponent(emailBody(f));
  const url = 'mailto:'+to+'?subject='+subject+'&body='+body;
  // Fallback: Falls mailto nicht reagiert, separat ein PDF generieren und herunterladen
  window.location.href = url;
  const docsMail = relevantPropertyDocs(f);
  const hasDocs = docsMail.length > 0;
  setTimeout(()=>{
    const msg = 'Wurde Ihr Mailprogramm geöffnet?\n\nHinweis: Bei mailto können keine Dateien automatisch angehängt werden.'
      + (hasDocs ? '\nDas PDF und '+docsMail.length+' relevante(s) Liegenschaftsdokument(e) werden heruntergeladen, damit Sie sie manuell anhängen können.' : '\nMöchten Sie das PDF herunterladen, um es manuell anzuhängen?');
    if(confirm(msg)){
      downloadPdf(f);
      if(hasDocs) docsMail.forEach(d=>{ try{ downloadDataUrl(d); }catch(e){} });
    }
  }, 1500);
}

async function shareForm(f){
  const doc = generatePdf(f); if(!doc) return;
  const blob = doc.output('blob');
  const files = [new File([blob], pdfFilename(f), {type:'application/pdf'})];

  // Nur die für dieses Permit relevanten Liegenschaftsdokumente anhängen
  const propDocs = relevantPropertyDocs(f);
  const attachedNames = [];
  propDocs.forEach(d=>{
    try{
      const b = dataUrlToBlob(d.data);
      files.push(new File([b], d.name||'Dokument', {type:d.type||'application/octet-stream'}));
      attachedNames.push(d.name||'Dokument');
    }catch(e){ /* einzelnes Dokument überspringen */ }
  });

  const shareData = {
    title: emailSubject(f),
    text: emailBody(f),
    files: files
  };
  try{
    if(navigator.canShare && navigator.canShare(shareData)){
      await navigator.share(shareData);
    }else if(navigator.canShare && navigator.canShare({files:[files[0]]})){
      // Mehrere Files nicht unterstützt – wenigstens das PDF teilen
      await navigator.share({title:shareData.title, text:shareData.text, files:[files[0]]});
      if(attachedNames.length){
        alert('Hinweis: Dieses Gerät unterstützt nur einen Anhang beim Teilen. Liegenschaftsdokumente werden separat heruntergeladen:\n• '+attachedNames.join('\n• '));
        propDocs.forEach(d=>{ try{ downloadDataUrl(d); }catch(e){} });
      }
    }else if(navigator.share){
      // Manche Browser können Files nicht – dann ohne Datei teilen
      await navigator.share({title:shareData.title, text:shareData.text});
      downloadPdf(f);
      propDocs.forEach(d=>{ try{ downloadDataUrl(d); }catch(e){} });
    }else{
      alert('Teilen wird auf diesem Gerät nicht unterstützt. PDF und Liegenschaftsdokumente werden heruntergeladen, damit Sie sie manuell senden können.');
      downloadPdf(f);
      propDocs.forEach(d=>{ try{ downloadDataUrl(d); }catch(e){} });
    }
  }catch(e){
    if(e.name!=='AbortError') alert('Teilen abgebrochen oder fehlgeschlagen: '+e.message);
  }
}

function backupTimestamp(){
  const d = new Date();
  const p = n => String(n).padStart(2,'0');
  return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'_'+p(d.getHours())+p(d.getMinutes());
}
function downloadJson(filename, obj){
  const blob = new Blob([JSON.stringify(obj, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}
function pickJsonFile(){
  return new Promise((resolve, reject)=>{
    const inp = document.createElement('input');
    inp.type = 'file';
    inp.accept = 'application/json,.json';
    inp.style.display = 'none';
    inp.addEventListener('change', e=>{
      const file = e.target.files && e.target.files[0];
      if(!file){ reject(new Error('Keine Datei gewählt')); return; }
      const r = new FileReader();
      r.onload = ()=>{ try{ resolve(JSON.parse(r.result)); }catch(err){ reject(new Error('Datei ist keine gültige JSON-Datei: '+err.message)); } };
      r.onerror = ()=>reject(r.error || new Error('FileReader-Fehler'));
      r.readAsText(file);
    });
    document.body.appendChild(inp);
    inp.click();
    setTimeout(()=>{ try{ document.body.removeChild(inp); }catch(e){} }, 5000);
  });
}

/* Merge-Strategie: bestehende Einträge per id behalten,
   neue ID-frei oder unbekannte hinzufügen, doppelte mit gleicher id ersetzen. */
function mergeMasterArrays(existing, incoming){
  if(!Array.isArray(existing)) existing = [];
  if(!Array.isArray(incoming)) return existing;
  const out = existing.slice();
  const idx = new Map(out.map((x,i)=>[x && x.id, i]));
  incoming.forEach(it=>{
    if(!it || typeof it!=='object') return;
    if(it.id && idx.has(it.id)){
      // ersetzen
      out[idx.get(it.id)] = it;
    } else {
      // neu anhängen (ggf. mit neuer id, damit kein Duplikat-Konflikt)
      if(!it.id) it.id = newId('x');
      out.push(it);
      idx.set(it.id, out.length-1);
    }
  });
  return out;
}

async function importMasterBackup(){
  let data;
  try{ data = await pickJsonFile(); }
  catch(e){ alert('Import abgebrochen: '+e.message); return; }
  if(!data || (data.schema !== 'ptw-master-backup' && data.schema !== 'ptw-full-backup')){
    alert('Diese Datei ist kein gültiges Apleona-Stammdaten-Backup.'); return;
  }
  const m = data.master || {};
  const c = {
    instructors: (m.instructors||[]).length,
    properties:  (m.properties||[]).length,
    contractors: (m.contractors||[]).length,
  };
  const exportedAt = data.exportedAt ? new Date(data.exportedAt).toLocaleString('de-CH') : 'unbekannt';
  // iOS-freundlich: zwei Standard-Dialoge statt prompt() mit Texteingabe
  const merge = confirm(
    'Backup-Datei erkannt (exportiert: '+exportedAt+'):\n'+
    '  • Einweiser: '+c.instructors+'\n'+
    '  • Liegenschaften: '+c.properties+'\n'+
    '  • Auftragnehmer: '+c.contractors+'\n\n'+
    'OK = ZUSAMMENFÜHREN (empfohlen – neue Einträge ergänzen, bestehende überschreiben)\n'+
    'Abbrechen = nicht zusammenführen (Sie können danach noch «Ersetzen» wählen)'
  );
  if(!merge){
    const replace = confirm('Stattdessen alle aktuellen Stammdaten auf diesem Gerät DURCH die Backup-Daten ERSETZEN?\n\nOK = Ersetzen   ·   Abbrechen = Import beenden');
    if(!replace) return;
    if(!confirm('Wirklich ERSETZEN? Alle aktuellen Stammdaten auf diesem Gerät werden überschrieben (vorher selbst Backup anlegen empfohlen).')) return;
    app.master = {
      instructors: Array.isArray(m.instructors) ? m.instructors : [],
      properties:  Array.isArray(m.properties)  ? m.properties  : [],
      contractors: Array.isArray(m.contractors) ? m.contractors : [],
    };
  } else {
    app.master.instructors = mergeMasterArrays(app.master.instructors, m.instructors);
    app.master.properties  = mergeMasterArrays(app.master.properties,  m.properties);
    app.master.contractors = mergeMasterArrays(app.master.contractors, m.contractors);
  }
  try{ persistMaster(); }
  catch(e){ alert('Speichern fehlgeschlagen – Browser-Speicher voll? Bitte grosse Dokumente entfernen.'); }
  alert('Import erfolgreich. Bestand jetzt:\n'+
    '  • Einweiser: '+app.master.instructors.length+'\n'+
    '  • Liegenschaften: '+app.master.properties.length+'\n'+
    '  • Auftragnehmer: '+app.master.contractors.length);
  render();
}

/* --- Komplett-Backup (Stammdaten + Permits) für Geräte-Umzug --- */
function exportFullBackup(){
  const payload = {
    schema: 'ptw-full-backup',
    version: 1,
    exportedAt: new Date().toISOString(),
    counts: {
      forms: (app.forms||[]).length,

      properties:  (app.master.properties||[]).length,
      contractors: (app.master.contractors||[]).length,
    },
    master: app.master,
    forms: app.forms,
  };

}
async function importFullBackup(){
  let data;
  try{ data = await pickJsonFile(); }
  catch(e){ alert('Import abgebrochen: '+e.message); return; }
  if(!data || (data.schema !== 'ptw-full-backup' && data.schema !== 'ptw-master-backup')){
    alert('Diese Datei ist kein gültiges Apleona-Backup.'); return;
  }
  const hasForms = Array.isArray(data.forms);
  const txt = 'Komplett-Backup erkannt:\n'+
    '  • Permits: '+(hasForms?data.forms.length:0)+'\n'+
    '  • Einweiser: '+((data.master&&data.master.instructors||[]).length)+'\n'+
    '  • Liegenschaften: '+((data.master&&data.master.properties||[]).length)+'\n'+
    '  • Auftragnehmer: '+((data.master&&data.master.contractors||[]).length)+'\n\n'+
    'OK = ZUSAMMENFÜHREN (Permits & Stammdaten ergänzen)\n'+
    'Abbrechen = stattdessen «Ersetzen» wählen oder Import beenden';
  const merge = confirm(txt);
  if(!merge){
    const replace = confirm('Komplett-Import als ERSETZEN durchführen?\n\nOK = Ersetzen   ·   Abbrechen = Import beenden');
    if(!replace) return;
    if(!confirm('Wirklich ERSETZEN? ALLE bisherigen Permits und Stammdaten auf diesem Gerät werden überschrieben.')) return;
    if(data.master){
      app.master = {
        instructors: Array.isArray(data.master.instructors) ? data.master.instructors : [],
        properties:  Array.isArray(data.master.properties)  ? data.master.properties  : [],
        contractors: Array.isArray(data.master.contractors) ? data.master.contractors : [],
      };
    }
    if(hasForms) app.forms = data.forms;
  } else {
    if(data.master){
      app.master.instructors = mergeMasterArrays(app.master.instructors, data.master.instructors);
      app.master.properties  = mergeMasterArrays(app.master.properties,  data.master.properties);
      app.master.contractors = mergeMasterArrays(app.master.contractors, data.master.contractors);
    }
    if(hasForms){
      const idx = new Map(app.forms.map((f,i)=>[f && f.id, i]));
      data.forms.forEach(f=>{
        if(!f || typeof f!=='object') return;
        if(f.id && idx.has(f.id)) app.forms[idx.get(f.id)] = f;
        else { if(!f.id) f.id = 'f_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,6); app.forms.unshift(f); }
      });
    }
  }
  try{ persist(); persistMaster(); }
  catch(e){ alert('Speichern fehlgeschlagen – Browser-Speicher voll?'); }
  alert('Import erfolgreich. Bestand jetzt:\n'+
    '  • Permits:          '+app.forms.length+'\n'+
    '  • Einweiser:        '+app.master.instructors.length+'\n'+
    '  • Liegenschaften:   '+app.master.properties.length+'\n'+
    '  • Auftragnehmer:    '+app.master.contractors.length);
  render();
}

async function exportAllZip(){
  if(!window.JSZip){ alert('ZIP-Bibliothek nicht geladen. Bitte einmal mit Internet öffnen.'); return; }
  const completed = app.forms.filter(f=>f.status==='completed');
  if(completed.length===0){ alert('Keine abgeschlossenen Formulare zum Exportieren vorhanden.'); return; }
  const zip = new JSZip();
  completed.forEach(f=>{
    const doc = generatePdf(f); if(!doc) return;
    zip.file(pdfFilename(f), doc.output('blob'));
  });
  // Zusätzlich: alle Daten als JSON-Backup
  zip.file('alle-formulare-backup.json', JSON.stringify(app.forms, null, 2));
  const blob = await zip.generateAsync({type:'blob'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'PermitsToWork_Export_'+new Date().toISOString().slice(0,10)+'.zip';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

try{
  // 1) Storage-Verfügbarkeit prüfen – Warnbanner einblenden, falls blockiert.
  storageHealthCheck();
  if(!STORAGE_OK) showStorageWarning();

  // 2) Daten laden.
  app.forms  = loadForms();
  app.master = loadMaster();

  // 2a) WICHTIG: Beim Init NUR persistieren, wenn im Storage noch nichts stand.
  //     Vorher wurden bereits gespeicherte Daten mit leerem seedMaster() überschrieben,
  //     wenn loadMaster() aus irgendeinem Grund leer zurückgab.
  try{ if(!FORMS_STORAGE_HAD_VALUE) persist(); }catch(e){}
  try{ if(!MASTER_STORAGE_HAD_VALUE) persistMasterNow(); }catch(e){}

  // 2b) Auto-Backup als Sicherheitsnetz einrichten (Master + Formulare).
  installMasterAutoBackup();
  installFormsAutoBackup();
  // Falls Master- oder Formulardaten mysteriös leer sind, aber ein Auto-Backup existiert:
  //     Wiederherstellungs-Dialog anbieten.
  maybeOfferMasterRestore();
  maybeOfferFormsRestore();

  // 3) Sitzungszustand wiederherstellen (Modus, aktueller Permit, Schritt).
  //    Damit springt die App nach einem Refresh nicht mehr aufs Dashboard zurück,
  //    sondern öffnet den zuletzt bearbeiteten Permit im letzten Schritt.
  const sess = loadSession();
  if(sess){
    if(sess.mode === 'edit' || sess.mode === 'view'){
      const stillExists = sess.currentId && app.forms.some(f => f.id === sess.currentId);
      if(stillExists){
        app.mode      = sess.mode;
        app.currentId = sess.currentId;
        app.step      = Math.max(0, Math.min(STEPS.length-1, sess.step|0));
      }
    } else if(sess.mode === 'masterdata'){
      app.mode = 'masterdata';
      if(sess.masterTab) app.masterTab = sess.masterTab;
    }
    if(sess.filter) app.filter = sess.filter;
  }

  render();

  // 4) Sitzung regelmässig persistieren (Modus/Permit/Schritt-Wechsel).
  //    Weil render() als Function-Declaration im geschlossenen Scope liegt,
  //    setzen wir statt eines Wrappers einen kleinen Watchdog.
  let _lastSess = '';
  setInterval(()=>{
    try{
      const snap = JSON.stringify({m:app.mode,c:app.currentId,s:app.step,t:app.masterTab,f:app.filter});
      if(snap !== _lastSess){ _lastSess = snap; persistSession(); }
    }catch(e){}
  }, 1500);
  try{ persistSession(); }catch(e){}

  // 5) Auto-Save beim Verlassen der Seite (Stammdaten IMMER sofort, nicht debounced).
  window.addEventListener('beforeunload', ()=>{
    try{ persist(); persistMasterNow(); persistSession(); }catch(e){}
  });
  // 6) Auf iOS/Safari beim Wechsel in den Hintergrund persistieren (beforeunload feuert dort oft nicht).
  window.addEventListener('pagehide', ()=>{
    try{ persist(); persistMasterNow(); persistSession(); }catch(e){}
  });
  document.addEventListener('visibilitychange', ()=>{
    if(document.visibilityState === 'hidden'){
      try{ persist(); persistMasterNow(); persistSession(); }catch(e){}
    }
  });
  // 7) Sicherheitsnetz: Alle 5 s einen finalen (verifizierten) Persist auslösen.
  setInterval(()=>{ try{ if(_masterPersistTimer){ persistMasterNow(); clearTimeout(_masterPersistTimer); _masterPersistTimer = null; } }catch(e){} }, 5000);
}catch(e){
  fatalError('Der Prototyp konnte nicht gestartet werden.', (e && (e.stack||e.message))||String(e));
  console.error(e);
}
